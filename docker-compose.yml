services:
  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
    environment:
      - NODE_ENV=development
      - API_BASE_URL=http://api:3333/api
    command:
      ["sh", "-c", "npm ci; npx nx dev web -- --hostname 0.0.0.0 --port 3000"]

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "3333:3333"
    volumes:
      - .:/workspace
      - node_modules:/workspace/node_modules
    environment:
      - NODE_ENV=development
      - PORT=3333
    command: ["sh", "-c", "npm ci; npx nx serve api"]

volumes:
  node_modules:
